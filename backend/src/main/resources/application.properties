# Server
server.port=8081

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/task_allocation?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=taskAllocationSuperSecretKeyForJWTSigningMustBe256BitsLong1234567890
app.jwt.expiration-ms=86400000

# CORS — comma-separated list. Supports wildcards (e.g. http://localhost:*)
app.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:3000,http://127.0.0.1:4200

